name: Build InmarScope

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-glfw
            mingw-w64-x86_64-rtl-sdr
            mingw-w64-x86_64-hackrf
            mingw-w64-x86_64-zstd
            mingw-w64-x86_64-libogg
            mingw-w64-x86_64-libvorbis
            mingw-w64-x86_64-sqlite3

      - name: Show environment
        run: |
          gcc --version
          cmake --version
          ninja --version
          pkg-config --version

      - name: Show repository layout
        run: |
          echo "===== Root ====="
          ls -la
          echo
          echo "===== third_party ====="
          ls -la third_party || true
          echo
          echo "===== libacars ====="
          ls -la third_party/libacars || true
          echo
          echo "===== .gitmodules ====="
          cat .gitmodules || true

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake .. \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: |
          cd build
          ninja

      - name: Upload binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: InmarScope-Windows
          path: |
            build/**/*.exe
            build/**/*.dll
            build/**/*.pdb
